# =============================================================================
# DL-CSI-v2: FDD Downlink CSI Prediction via CNN + Transformer
# =============================================================================
# Copy this file and modify paths / hyperparameters for your local environment.
# All paths are relative to the project root unless noted otherwise.

project:
  name: "DL_CSI_v2"
  seed: 42
  device: "cuda"            # 固定 CUDA
  mixed_precision: true     # 4090 支持 bf16
  output_dir: "./outputs"
  log_dir: "./outputs/logs"
  checkpoint_dir: "./outputs/checkpoints"

# -----------------------------------------------------------------------------
# Data generation (Sionna 2.x, TensorFlow backend)
# -----------------------------------------------------------------------------
data:
  # Output
  raw_data_dir: "./data/raw"
  processed_data_dir: "./data/processed"
  h5_train: "./data/processed/train.h5"
  h5_val: "./data/processed/val.h5"
  h5_test: "./data/processed/test_cdla.h5"

  # 3GPP scenario: UMa | UMi | RMa
  scenario: "A"
  # Carrier frequencies (Hz) for UL and DL
  ul_carrier_freq: 2.0e9   # e.g., 2 GHz uplink
  dl_carrier_freq: 2.1e9   # e.g., 2.1 GHz downlink
  bandwidth: 20e6          # Hz
  subcarrier_spacing: 30e3 # Hz
  num_ofdm_symbols: 14     # per slot
  cyclic_prefix_length: 0  # normal CP handled by Sionna OFDM

  # Antenna arrays
  bs_array:
    type: "ULA"            # ULA only in this release
    num_elements: 32       # 32 or 64
    polarization: "single" # single | cross
    spacing: 0.5           # in wavelengths
  ue_array:
    type: "ULA"
    num_elements: 4        # 4 or 8
    polarization: "single"
    spacing: 0.5

  # OFDM / channel grid
  num_subcarriers: 32      # M = 64 or 128
  num_slots: 17            # T_history + 1 current slot
  history_window: 16       # T = 16 historical slots
  samples:
    train: 70000
    val: 10000
    test: 20

  # Large-scale parameters to extract and share between UL/DL
  large_scale_params:
    - "avg_path_power"      # average path power (dB)
    - "rms_delay_spread"    # sqrt(E[tau^2] - E[tau]^2)
    - "aoa_spread"          # azimuth angle spread of arrival
    - "aod_spread"          # azimuth angle spread of departure
    - "k_factor"            # optional Rician K-factor if available
    - "bs_ue_distance"      # distance dependent path loss info

  # Generation control
  generate_history: false  # 是否生成历史 CSI；false 可显著减小 H5 体积
  batch_size_per_file: 512 # how many samples to accumulate before flushing to H5
  num_workers: 4           # parallel generation workers (set 0 if TF/Sionna unstable)
  save_ray_info: true      # keep aod/aoa/tau/powers arrays in H5 for debug

# -----------------------------------------------------------------------------
# Pre-processing: spatial-frequency -> angle-delay domain
# -----------------------------------------------------------------------------
preprocess:
  normalize_per_sample: true
  angle_delay:
    # For ULA, apply 1D-DFT along the BS antenna dimension and IFFT along subcarrier dim.
    # For 2D arrays (e.g., UPA), set use_2d_antenna_dft: true.
    use_2d_antenna_dft: false
    apply_window: false    # Hann window on delay domain if desired

# -----------------------------------------------------------------------------
# Model architecture
# -----------------------------------------------------------------------------
model:
  # Whether to use the historical UL/DL CSI branch.
  # Set to false to run the no-history ablation (current UL + large-scale only).
  use_history: false

  # Whether to use the explicit large-scale parameter branch.
  # Set to false to run the no-large-scale ablation (current UL + history only).
  use_large_scale: true

  # Shared feature dimension after local encoders.
  feature_dim: 512         # small dims for fast Stage1 training

  # Hidden dimension of the Transformer fusion block.
  # Can equal feature_dim, or be different (a linear projection is added automatically).
  hidden_dim: 512

  # CSI Encoder: current uplink CSI in angle-delay domain
  csi_encoder:
    in_channels: 2         # real & imag concatenated as channels
    base_channels: 64
    num_layers: 4          # matches trained Stage1 checkpoint
    kernel_size: 3
    use_bn: false          # LayerNorm preferred for regression
    dropout: 0.1

  # Temporal Encoder: historical UL/DL pairs
  temporal_encoder:
    csi:
      in_channels: 2
      base_channels: 32
      csi_feature_dim: 256
      num_layers: 3
      kernel_size: 3
      dropout: 0.1
    transformer:
      num_layers: 4
      hidden_dim: 256
      num_heads: 4
      mlp_ratio: 4.0
      dropout: 0.1

  # Environment / large-scale parameter encoder
  env_encoder:
    input_dim: 6           # must match len(data.large_scale_params)
    hidden_dims: [128, 256]
    output_dim: 512        # matches feature_dim
    dropout: 0.1

  # Cross-attention fusion (optional)
  fusion:
    use_cross_attention: true
    num_heads: 8
    hidden_dim: 512
    dropout: 0.1

  # Transformer fusion block over the modality tokens.
  transformer_fusion:
    num_layers: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.1

  # Regression head -> predicted downlink CSI (angle-delay)
  regression_head:
    hidden_dim: 1024        # matches trained Stage1 checkpoint
    dropout: 0.1
    output_mode: "ri"      # "ri" = real+imag concatenated, "amp_phase" = amp/phase

# -----------------------------------------------------------------------------
# Training (single-stage, end-to-end)
# -----------------------------------------------------------------------------
training:
  batch_size: 32           # Phase2 主训练 batch size；Stage1 已训练完成，32 在 RTX 4090 24 GB 上更稳
  num_workers: 8
  pin_memory: true
  gradient_clip: 1.0

  epochs: 50
  lr: 1.0e-3
  weight_decay: 1.0e-4
  optimizer: "adamw"
  scheduler: "cosine"

  loss:
    mse_weight: 1.0         # strong complex MSE to break fixed-output collapse
    magnitude_weight: 1.0    # magnitude MSE: main objective for FDD independent fast fading
    angle_delay_l1_weight: 0.1
    diversity_weight: 0.5    # strong penalty on batch-wise collapse
    use_ratio: true          # compute magnitude loss in |H_DL|/|H_UL| space

  # Training-time uplink corruption.  We heavily corrupt the UL input so the
  # network cannot ignore it and memorize an average downlink spectrum.
  ul_noise_prob: 0.8
  ul_noise_snr_list: [-10, -5, 0, 5, 10, 15, 20]
  ul_mask_prob: 0.5        # probability to apply random spatial-frequency masking
  ul_mask_ratio: 0.5       # fraction of UL elements to zero out

  early_stopping:
    patience: 10
    monitor: "val_magnitude_nmse_db"  # or "val_nmse_db" if you switch back to complex training
    mode: "min"

  logging:
    log_interval: 50       # steps
    eval_interval: 1       # epochs
    save_interval: 5       # epochs

# -----------------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------------
evaluation:
  batch_size: 64
  metrics:
    - "nmse"
    - "cosine_similarity"
    - "nmse_angle_delay"
    - "cosine_similarity_angle_delay"
  baselines:
    - "copy_ul"
    - "angle_delay_interp"
    - "no_large_scale"
    - "no_history"

# -----------------------------------------------------------------------------
# Phase 2: Phase Recovery Network
# -----------------------------------------------------------------------------
phase2:
  enabled: true
  stage1_checkpoint: "./outputs/checkpoints/best.pt"

  model:
    # Phase2 feature dim.  RTX 4090 24 GB 可支撑 256；若训练稳定且显存仍有 6 GB+
    # 余量，可进一步提升到 512 以匹配 Stage1。
    feat_dim: 256
    sparse_encoder:
      num_layers: 4
      kernel_size: 5
      dropout: 0.1
    mag_encoder:
      num_layers: 3
      kernel_size: 3
      dropout: 0.1
    mag_attention:
      num_heads: 8
      dropout: 0.1
    freq_interpolator:
      num_layers: 6
      num_heads: 8
      mlp_ratio: 4.0
      dropout: 0.05
    phase_head:
      hidden_dim: 512
    use_ul_guidance: false
    # Ablation switch (simPlan 2.1 fig 4a). Keep true for the proposed model.
    # Set false and retrain to produce the "no magnitude aid" ablation curve.
    use_magnitude: true

  sampling:
    use_adaptive: true
    base_spacing: 8
    use_nonuniform_peaks: true
    peak_prob: 0.7
    peak_neighbors: 2
    random_offset: true

  quantization:
    num_bits: 16

  training:
    warmup:
      epochs: 15
      lr: 1.0e-3
      weight_decay: 1.0e-4
      gradient_clip: 1.0
      gradient_accumulation: 1
      loss:
        mse_weight: 1.0
        phase_weight: 0.5
        angle_l1_weight: 0.1

    main:
      epochs: 80
      lr: 5.0e-4
      weight_decay: 1.0e-4
      gradient_clip: 1.0
      gradient_accumulation: 2
      scheduler: "cosine"
      warmup_ratio: 0.1
      loss:
        mse_weight: 1.0
        phase_weight: 0.5
        angle_l1_weight: 0.1
      early_stopping:
        patience: 12
        monitor: "nmse_db"
      logging:
        eval_interval: 1
        save_interval: 5

    qat:
      epochs: 40
      lr: 2.0e-4
      weight_decay: 1.0e-4
      gradient_clip: 1.0
      gradient_accumulation: 2
      qat_ratio: 0.8
      loss:
        mse_weight: 1.0
        phase_weight: 0.5
        angle_l1_weight: 0.1
      early_stopping:
        patience: 12
        monitor: "nmse_db"
      logging:
        eval_interval: 1
        save_interval: 5

  evaluation:
    batch_size: 32
    baselines:
      - "magnitude_only"
      - "linear_interp"
      - "dft_interp"

# -----------------------------------------------------------------------------
# Simulation sweeps (scripts/run_simulation.py) -> paper curves
# -----------------------------------------------------------------------------
simulation:
  # x-axis grids
  snr_list: [-10, -5, 0, 5, 10, 15, 20, 25, 30]   # NMSE/SE vs SNR
  overhead_list: [0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.4, 0.5]  # pilot overhead
  quant_bits_list: [16, 8, 4, 2]  # quantization bit-widths for NMSE vs SNR
  fixed_snr: 10.0          # SNR used for overhead sweeps (simPlan 1.2 / 4c)
  seeds: [42, 43, 44]      # noise realizations averaged for error bars
  output_dir: "./outputs/sim"
  # CDL scenarios for the generalization sweep (simPlan 2.2). Requires
  # regenerating per-scenario test H5 files first; see researchPlan/simRun.md.
  scenarios: ["A", "C", "D"]
