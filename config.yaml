# =============================================================================
# DL-CSI-v2: FDD Downlink CSI Prediction via DeepSeek-LLM + LoRA
# =============================================================================
# Copy this file and modify paths / hyperparameters for your local environment.
# All paths are relative to the project root unless noted otherwise.

project:
  name: "DL_CSI_v2"
  seed: 42
  device: "auto"          # "auto" | "cuda" | "cpu"
  mixed_precision: true   # use torch.autocast(bfloat16) for forward pass
  output_dir: "./outputs"
  log_dir: "./outputs/logs"
  checkpoint_dir: "./outputs/checkpoints"

# -----------------------------------------------------------------------------
# Data generation (Sionna 2.x, TensorFlow backend)
# -----------------------------------------------------------------------------
data:
  # Output
  raw_data_dir: "./data/raw"
  processed_data_dir: "./data/processed"
  h5_train: "./data/processed/train.h5"
  h5_val: "./data/processed/val.h5"
  h5_test: "./data/processed/test.h5"

  # 3GPP scenario: UMa | UMi | RMa
  scenario: "UMa"
  # Carrier frequencies (Hz) for UL and DL
  ul_carrier_freq: 2.0e9   # e.g., 2 GHz uplink
  dl_carrier_freq: 2.1e9   # e.g., 2.1 GHz downlink
  bandwidth: 20e6          # Hz
  subcarrier_spacing: 30e3 # Hz
  num_ofdm_symbols: 14     # per slot
  cyclic_prefix_length: 0  # normal CP handled by Sionna OFDM

  # Antenna arrays
  bs_array:
    type: "ULA"            # ULA only in this release
    num_elements: 64       # 32 or 64
    polarization: "single" # single | cross
    spacing: 0.5           # in wavelengths
  ue_array:
    type: "ULA"
    num_elements: 8        # 4 or 8
    polarization: "single"
    spacing: 0.5

  # OFDM / channel grid
  num_subcarriers: 64      # M = 64 or 128
  num_slots: 17            # T_history + 1 current slot
  history_window: 16       # T = 16 historical slots
  samples:
    train: 70000
    val: 10000
    test: 20000

  # Large-scale parameters to extract and share between UL/DL
  large_scale_params:
    - "avg_path_power"      # average path power (dB)
    - "rms_delay_spread"    # sqrt(E[tau^2] - E[tau]^2)
    - "aoa_spread"          # azimuth angle spread of arrival
    - "aod_spread"          # azimuth angle spread of departure
    - "k_factor"            # optional Rician K-factor if available
    - "bs_ue_distance"      # distance dependent path loss info

  # Generation control
  batch_size_per_file: 256 # how many samples to accumulate before flushing to H5
  num_workers: 4           # parallel generation workers (set 0 if TF/Sionna unstable)
  save_ray_info: true      # keep aod/aoa/tau/powers arrays in H5 for debug

# -----------------------------------------------------------------------------
# Pre-processing: spatial-frequency -> angle-delay domain
# -----------------------------------------------------------------------------
preprocess:
  normalize_per_sample: true
  angle_delay:
    # For ULA, apply 1D-DFT along the BS antenna dimension and IFFT along subcarrier dim.
    # For 2D arrays (e.g., UPA), set use_2d_antenna_dft: true.
    use_2d_antenna_dft: false
    apply_window: false    # Hann window on delay domain if desired

# -----------------------------------------------------------------------------
# Model architecture
# -----------------------------------------------------------------------------
model:
  # Continuous feature -> LLM hidden projection
  feature_dim: 512         # dimension after CSI / temporal encoders
  llm_hidden_dim: 1536     # DeepSeek-R1-Distill-Qwen-1.5B hidden size
  num_virtual_tokens: 3    # number of soft tokens: [current_ul, temporal, env]

  # Local LLM path (offline weights)
  llm_path: "./models/deepseek-1_5b"

  # CSI Encoder: current uplink CSI in angle-delay domain
  csi_encoder:
    in_channels: 2         # real & imag concatenated as channels
    base_channels: 64
    num_layers: 4          # 4 layers; last layer skips pooling on N_rx to avoid collapse
    kernel_size: 3
    use_bn: false          # LayerNorm preferred for regression
    dropout: 0.1

  # Temporal Encoder: historical UL/DL pairs
  temporal_encoder:
    csi:
      in_channels: 2
      base_channels: 32
      csi_feature_dim: 256
      num_layers: 3
      kernel_size: 3
      dropout: 0.1
    transformer:
      num_layers: 4
      hidden_dim: 256
      num_heads: 4
      mlp_ratio: 4.0
      dropout: 0.1

  # Environment / large-scale parameter encoder
  env_encoder:
    input_dim: 6           # must match len(data.large_scale_params)
    hidden_dims: [128, 256]
    output_dim: 512        # matches feature_dim
    dropout: 0.1

  # Cross-attention fusion (optional)
  fusion:
    use_cross_attention: true
    num_heads: 8
    hidden_dim: 512
    dropout: 0.1

  # Regression head -> predicted downlink CSI (angle-delay)
  regression_head:
    hidden_dim: 1024
    dropout: 0.1
    output_mode: "ri"      # "ri" = real+imag concatenated, "amp_phase" = amp/phase

# -----------------------------------------------------------------------------
# LoRA configuration
# -----------------------------------------------------------------------------
lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  modules_to_save: []  # we use a custom regression head instead of lm_head

# -----------------------------------------------------------------------------
# Training strategy (three-stage)
# -----------------------------------------------------------------------------
training:
  batch_size: 16
  num_workers: 4
  pin_memory: true
  gradient_clip: 1.0

  warmup:
    epochs: 30
    lr: 1.0e-3
    weight_decay: 1.0e-4
    optimizer: "adamw"
    scheduler: "cosine"
    freeze_llm: true
    freeze_lora: true
    train_encoders: true
    train_regression_head: true
    loss:
      mse_weight: 1.0
      angle_delay_l1_weight: 0.1

  lora:
    epochs: 50
    lr: 1.0e-4
    weight_decay: 1.0e-4
    optimizer: "adamw"
    scheduler: "cosine"
    warmup_steps: 500
    freeze_llm: true
    freeze_lora: false
    train_encoders: true
    train_regression_head: true
    loss:
      mse_weight: 1.0
      angle_delay_l1_weight: 0.2

  full_finetune:           # optional stage
    enabled: false
    epochs: 10
    lr: 5.0e-6
    weight_decay: 1.0e-4
    optimizer: "adamw"
    scheduler: "cosine"
    unfreeze_llm: false    # keep LLM frozen; unfreeze only projection + head if true

  early_stopping:
    patience: 10
    monitor: "val_nmse"
    mode: "min"

  logging:
    log_interval: 50       # steps
    eval_interval: 1       # epochs
    save_interval: 5       # epochs

# -----------------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------------
evaluation:
  batch_size: 32
  metrics:
    - "nmse"
    - "cosine_similarity"
    - "nmse_angle_delay"
    - "cosine_similarity_angle_delay"
  baselines:
    - "copy_ul"
    - "angle_delay_interp"
    - "tdd_oracle"
    - "no_large_scale"
    - "no_history"
