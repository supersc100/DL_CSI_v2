# =============================================================================
# DL-CSI-v2: 大模型 + 纯幅度 Stage1 对比配置
# =============================================================================
# 与 config.yaml 相比：
#   - 恢复 feature_dim/hidden_dim=512，CSI encoder 回到 4 层/64 通道
#   - 回归头使用 amp_phase，只预测幅度（相位由 Stage2 恢复）
#   - 关闭复数 MSE 和 log-ratio，使用普通幅度 MSE
#   - 减弱 UL 腐蚀，降低训练不稳定性
#   - 输出目录独立为 ./outputs_large_amp，避免覆盖当前 Stage1 checkpoint
# =============================================================================

project:
  name: "DL_CSI_v2_large_amp"
  seed: 42
  device: "cuda"
  mixed_precision: true
  output_dir: "./outputs_large_amp"
  log_dir: "./outputs_large_amp/logs"
  checkpoint_dir: "./outputs_large_amp/checkpoints"

# -----------------------------------------------------------------------------
# Data generation (Sionna 2.x, TensorFlow backend)
# -----------------------------------------------------------------------------
data:
  raw_data_dir: "./data/raw"
  processed_data_dir: "./data/processed"
  h5_train: "./data/processed/train_cdld.h5"
  h5_val: "./data/processed/val_cdld.h5"
  h5_test: "./data/processed/test_cdld.h5"

  scenario: "UMa"
  ul_carrier_freq: 2.0e9
  dl_carrier_freq: 2.1e9
  bandwidth: 20e6
  subcarrier_spacing: 30e3
  num_ofdm_symbols: 14
  cyclic_prefix_length: 0

  bs_array:
    type: "ULA"
    num_elements: 32
    polarization: "single"
    spacing: 0.5
  ue_array:
    type: "ULA"
    num_elements: 4
    polarization: "single"
    spacing: 0.5

  num_subcarriers: 32
  num_slots: 17
  history_window: 16
  samples:
    train: 70000
    val: 10000
    test: 20000

  large_scale_params:
    - "avg_path_power"
    - "rms_delay_spread"
    - "aoa_spread"
    - "aod_spread"
    - "k_factor"
    - "bs_ue_distance"

  generate_history: false
  batch_size_per_file: 512
  num_workers: 4
  save_ray_info: true

# -----------------------------------------------------------------------------
# Pre-processing
# -----------------------------------------------------------------------------
preprocess:
  normalize_per_sample: true
  angle_delay:
    use_2d_antenna_dft: false
    apply_window: false

# -----------------------------------------------------------------------------
# Model architecture：大容量 Stage1，只预测幅度
# -----------------------------------------------------------------------------
model:
  use_history: false
  use_large_scale: true

  feature_dim: 512
  hidden_dim: 512

  csi_encoder:
    in_channels: 2
    base_channels: 64
    num_layers: 4
    kernel_size: 3
    use_bn: false
    dropout: 0.1

  temporal_encoder:
    csi:
      in_channels: 2
      base_channels: 32
      csi_feature_dim: 256
      num_layers: 3
      kernel_size: 3
      dropout: 0.1
    transformer:
      num_layers: 4
      hidden_dim: 256
      num_heads: 4
      mlp_ratio: 4.0
      dropout: 0.1

  env_encoder:
    input_dim: 6
    hidden_dims: [128, 256]
    output_dim: 512
    dropout: 0.1

  fusion:
    use_cross_attention: true
    num_heads: 8
    hidden_dim: 512
    dropout: 0.1

  transformer_fusion:
    num_layers: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.1

  regression_head:
    hidden_dim: 1024
    dropout: 0.1
    output_mode: "amp_phase"   # 只预测幅度/相位，不直接预测复数实虚部

# -----------------------------------------------------------------------------
# Training：纯幅度目标，减弱 UL 腐蚀
# -----------------------------------------------------------------------------
training:
  batch_size: 32              # 大模型用更小 batch，防止 OOM
  num_workers: 8
  pin_memory: true
  gradient_clip: 1.0

  epochs: 50
  lr: 1.0e-3                  # 纯幅度 MSE 更稳定，可用更大学习率
  weight_decay: 1.0e-4
  optimizer: "adamw"
  scheduler: "cosine"

  loss:
    mse_weight: 0.0           # 关闭复数 MSE，避免不可学习的相位干扰
    magnitude_weight: 1.0     # 普通幅度 MSE
    angle_delay_l1_weight: 0.1
    diversity_weight: 0.0
    use_ratio: false          # 关闭 log-ratio，直接拟合 |H_DL|
    ratio_eps: 1.0e-6

  # 轻度的 UL 腐蚀：足够防止模板 collapse，但不至于破坏 UL 结构
  ul_noise_prob: 0.3
  ul_noise_snr_list: [0, 5, 10, 15, 20]
  ul_mask_prob: 0.2
  ul_mask_ratio: 0.3

  early_stopping:
    patience: 10
    monitor: "val_magnitude_nmse_db"
    mode: "min"

  logging:
    log_interval: 50
    eval_interval: 1
    save_interval: 5

# -----------------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------------
evaluation:
  batch_size: 64
  metrics:
    - "nmse"
    - "cosine_similarity"
    - "nmse_angle_delay"
    - "cosine_similarity_angle_delay"
  baselines:
    - "copy_ul"
    - "angle_delay_interp"
    - "no_large_scale"
    - "no_history"

# -----------------------------------------------------------------------------
# Phase 2：保留接口，但 Stage1 训练时会写入 ./outputs_large_amp/checkpoints/best.pt
# -----------------------------------------------------------------------------
phase2:
  enabled: true
  stage1_checkpoint: "./outputs_large_amp/checkpoints/best.pt"

  model:
    feat_dim: 256
    sparse_encoder:
      num_layers: 4
      kernel_size: 5
      dropout: 0.1
    mag_encoder:
      num_layers: 3
      kernel_size: 3
      dropout: 0.1
    mag_attention:
      num_heads: 8
      dropout: 0.1
    freq_interpolator:
      num_layers: 6
      num_heads: 8
      mlp_ratio: 4.0
      dropout: 0.05
    phase_head:
      hidden_dim: 512
    use_ul_guidance: false
    use_magnitude: true

  sampling:
    use_adaptive: true
    base_spacing: 8
    use_nonuniform_peaks: true
    peak_prob: 0.7
    peak_neighbors: 2
    random_offset: true

  quantization:
    num_bits: 16

  training:
    warmup:
      epochs: 15
      lr: 1.0e-3
      weight_decay: 1.0e-4
      gradient_clip: 1.0
      gradient_accumulation: 1
      loss:
        mse_weight: 1.0
        phase_weight: 0.5
        angle_l1_weight: 0.1

    main:
      epochs: 80
      lr: 5.0e-4
      weight_decay: 1.0e-4
      gradient_clip: 1.0
      gradient_accumulation: 2
      scheduler: "cosine"
      warmup_ratio: 0.1
      loss:
        mse_weight: 1.0
        phase_weight: 0.5
        angle_l1_weight: 0.1
      early_stopping:
        patience: 12
        monitor: "nmse_db"
      logging:
        eval_interval: 1
        save_interval: 5

    qat:
      epochs: 40
      lr: 2.0e-4
      weight_decay: 1.0e-4
      gradient_clip: 1.0
      gradient_accumulation: 2
      qat_ratio: 0.8
      loss:
        mse_weight: 1.0
        phase_weight: 0.5
        angle_l1_weight: 0.1
      early_stopping:
        patience: 12
        monitor: "nmse_db"
      logging:
        eval_interval: 1
        save_interval: 5

  evaluation:
    batch_size: 32
    baselines:
      - "magnitude_only"
      - "linear_interp"
      - "dft_interp"

# -----------------------------------------------------------------------------
# Simulation sweeps
# -----------------------------------------------------------------------------
simulation:
  snr_list: [-10, -5, 0, 5, 10, 15, 20, 25, 30]
  overhead_list: [0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.4, 0.5]
  quant_bits_list: [16, 8, 4, 2]
  fixed_snr: 10.0
  seeds: [42, 43, 44]
  output_dir: "./outputs_large_amp/sim"
  scenarios: ["A", "C", "D"]
